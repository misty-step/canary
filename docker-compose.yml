services:
  canary:
    build: .
    image: canary:local
    ports:
      - "4000:4000"
    environment:
      CANARY_DB_PATH: /data/canary.db
      CANARY_REQUIRE_LITESTREAM: "0"
    volumes:
      - canary-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  canary-doctor:
    image: rust:1.94.0-bookworm@sha256:365468470075493dc4583f47387001854321c5a8583ea9604b297e67f01c5a4f
    profiles:
      - tools
    working_dir: /workspace
    environment:
      CARGO_TARGET_DIR: /cargo-target
      PATH: /usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # No inline value: Compose passes this through from the invoking
      # shell's own environment, so the key never appears as a literal
      # `-e CANARY_API_KEY=<value>` argument on the `docker compose run`
      # command line. See docs/self-host-docker.md.
      CANARY_API_KEY:
    volumes:
      - .:/workspace:ro
      - canary-cargo-git:/usr/local/cargo/git
      - canary-cargo-registry:/usr/local/cargo/registry
      - canary-cargo-target:/cargo-target
    entrypoint: ["/bin/bash", "/workspace/bin/canary-doctor-entrypoint.sh"]

volumes:
  canary-data:
  canary-cargo-git:
  canary-cargo-registry:
  canary-cargo-target:
