name: Canary Witness

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: canary-witness
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  witness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      CANARY_WITNESS_ENDPOINT: https://canary-obs.fly.dev
      CANARY_WITNESS_MONITOR: canary-watchman
      CANARY_WITNESS_READ_KEY: ${{ secrets.CANARY_WITNESS_READ_KEY }}
      CANARY_WITNESS_INGEST_KEY: ${{ secrets.CANARY_WITNESS_INGEST_KEY }}
      ISSUE_LABEL: canary-witness-failed
      ISSUE_TITLE: "Canary witness failed"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run external witness
        id: check
        run: |
          set +e
          bin/canary-witness \
            --receipt "$RUNNER_TEMP/canary-witness-receipt.json" \
            --require-check-in
          EXIT_CODE=$?
          set -e

          if [ ! -f "$RUNNER_TEMP/canary-witness-receipt.json" ]; then
            jq -n \
              --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg endpoint "$CANARY_WITNESS_ENDPOINT" \
              --arg monitor "$CANARY_WITNESS_MONITOR" \
              --argjson exit_code "$EXIT_CODE" \
              '{
                schema_version: 1,
                witness: $monitor,
                endpoint: $endpoint,
                observed_at: $observed_at,
                status: "witness_failed_before_receipt",
                exit_code: $exit_code,
                probes: {},
                check_in: null
              }' > "$RUNNER_TEMP/canary-witness-receipt.json"
          fi

          STATUS=$(jq -r '.status // "unknown"' "$RUNNER_TEMP/canary-witness-receipt.json")
          OBSERVED_AT=$(jq -r '.observed_at // "unknown"' "$RUNNER_TEMP/canary-witness-receipt.json")
          {
            echo "exit_code=$EXIT_CODE"
            echo "status=$STATUS"
            echo "observed_at=$OBSERVED_AT"
          } >> "$GITHUB_OUTPUT"

      - name: Upload witness receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-witness-${{ github.run_id }}
          path: ${{ runner.temp }}/canary-witness-receipt.json
          if-no-files-found: error

      - name: Find existing incident issue
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "$ISSUE_LABEL" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - name: Ensure label exists
        if: steps.check.outputs.exit_code != '0' && steps.find.outputs.issue == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "$ISSUE_LABEL" \
            --repo "${{ github.repository }}" \
            --description "Automated: external Canary witness failed" \
            --color "B60205" 2>/dev/null || true

      - name: Open incident issue
        if: steps.check.outputs.exit_code != '0' && steps.find.outputs.issue == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECEIPT_SUMMARY=$(jq -c '{
            status,
            observed_at,
            healthz: .probes.healthz,
            readyz: .probes.readyz,
            canary_query: .probes.canary_query,
            check_in: .check_in
          }' "$RUNNER_TEMP/canary-witness-receipt.json")
          BODY=$(cat <<EOF
          ## Canary witness failed

          The external witness could not verify Canary.

          **Witness status:** ${{ steps.check.outputs.status }}
          **Observed at:** ${{ steps.check.outputs.observed_at }}
          **Receipt artifact:** canary-witness-${{ github.run_id }}

          ### Receipt summary

          \`\`\`json
          ${RECEIPT_SUMMARY}
          \`\`\`

          ### Runbook

          1. Check the uploaded \`canary-witness-receipt.json\` artifact.
          2. Check Fly.io machine status: \`flyctl status --app canary-obs\`
          3. Check logs: \`flyctl logs --app canary-obs\`
          4. Check recent self-errors: \`bin/canary errors canary --window 1h\`
          5. If DB corruption is suspected, see \`docs/backup-restore-dr.md\`.

          This issue will auto-close when the witness detects recovery.
          EOF
          )
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$ISSUE_TITLE" \
            --label "$ISSUE_LABEL" \
            --body "$BODY"

      - name: Close recovered issue
        if: steps.check.outputs.exit_code == '0' && steps.find.outputs.issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close "${{ steps.find.outputs.issue }}" \
            --repo "${{ github.repository }}" \
            --comment "Canary witness recovered at ${{ steps.check.outputs.observed_at }}." \
            || true

      - name: Fail workflow if witness failed
        if: steps.check.outputs.exit_code != '0'
        run: |
          exit_code="${{ steps.check.outputs.exit_code }}"
          if [ "$exit_code" -lt 0 ] || [ "$exit_code" -gt 255 ]; then
            echo "Invalid witness exit code: $exit_code" >&2
            exit 1
          fi
          exit "$exit_code"
