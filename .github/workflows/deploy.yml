name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  changes:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      triage: ${{ steps.filter.outputs.triage }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - name: Detect changed paths
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "core=false" >> "$GITHUB_OUTPUT"
          echo "triage=false" >> "$GITHUB_OUTPUT"
          if echo "$CHANGED" | grep -qv '^triage/'; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q '^triage/'; then
            echo "triage=true" >> "$GITHUB_OUTPUT"
          fi

  core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  triage:
    needs: changes
    if: needs.changes.outputs.triage == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: triage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
