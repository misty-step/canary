name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dagger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Read Dagger engine version
        id: dagger_version
        run: echo "version=$(jq -r '.engineVersion | ltrimstr(\"v\")' dagger.json)" >> "$GITHUB_OUTPUT"
      - name: Run Dagger strict CI
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: ${{ steps.dagger_version.outputs.version }}
          verb: call
          args: strict
