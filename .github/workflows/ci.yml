name: CI

on:
  push:
    branches: [master]
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dagger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout trusted CI control plane
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: .ci/trusted
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
      - name: Checkout candidate source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: .ci/candidate
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Read trusted Dagger engine version
        id: dagger_version
        run: echo "version=$(jq -r '.engineVersion | ltrimstr(\"v\")' .ci/trusted/dagger.json)" >> "$GITHUB_OUTPUT"
      - name: Run trusted Dagger strict CI
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: ${{ steps.dagger_version.outputs.version }}
          workdir: .ci/trusted
          verb: call
          args: strict --source=../candidate
